name: Scrape TradingView + publish + notify Make

permissions:
  contents: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore seen ids from gh-pages
        run: |
          mkdir -p output
          curl -fsSL \
            https://joaopauloclima.github.io/jornal_cripto_feed/seen-ids.json \
            -o output/seen-ids.json || true

      - name: Setup Node.js + cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run scraper and write summary
        id: run_scraper
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          node src/generate-feed.js
          node src/write-scrape-summary.js

      - name: Read summary
        id: read_summary
        run: |
          TOTAL=$(grep 'TOTAL_ITEMS' scrape_summary.txt | cut -d'=' -f2)
          NEW=$(grep 'NEW_ITEMS' scrape_summary.txt | cut -d'=' -f2)
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "new=${NEW}" >> $GITHUB_OUTPUT

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            page.html
            page.png
            output/feed.json
            output/new-items.json
            output/seen-ids.json

      - name: Prepare public files
        if: steps.read_summary.outputs.new != '0'
        run: |
          mkdir -p public
          cp output/feed.json public/feed.json
          cp output/seen-ids.json public/seen-ids.json

      - name: Deploy to gh-pages via action
        if: steps.read_summary.outputs.new != '0'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Show artifacts
        if: always()
        run: |
          echo "feed.json (first lines):"
          head -n 20 output/feed.json || true
          echo "diff.json (first lines):"
          head -n 20 output/diff.json || true
          echo "scrape_summary.txt:"
          cat scrape_summary.txt || true
